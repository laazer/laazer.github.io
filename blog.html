<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post - Laazer</title>
  <meta name="description" content="Blog post" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/blog.css?v=11">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/tokyo-night-dark.min.css">
  <link rel="shortcut icon" href="images/lzr2-favicon.ico">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
</head>
<body>
  <div class="blog-shell" id="top">
    <header class="blog-nav">
      <a href="index.html#blogs" class="blog-back-link">← Back to all posts</a>
    </header>

    <header class="blog-header glass">
      <div class="blog-type-badge" id="blog-type-badge" style="display:none;"></div>
      <div class="blog-meta" id="blog-meta" style="display:none;"></div>
      <h1 class="blog-title-main" id="blog-title">Loading…</h1>
    </header>

    <main class="blog-content glass">
      <article class="blog-body" id="blog-body">
        <p class="blog-loading">Loading post…</p>
      </article>
    </main>

  <div class="blog-bottom-nav glass" id="blog-bottom-nav" aria-hidden="true" style="display:none;">
    <div class="blog-bottom-row">
      <a class="blog-bottom-link blog-bottom-link-prev" id="blog-prev" href="#" aria-disabled="true" tabindex="-1">← Previous</a>
      <a class="blog-bottom-link blog-bottom-link-next" id="blog-next" href="#" aria-disabled="true" tabindex="-1">Next →</a>
    </div>

    <div class="blog-bottom-row blog-bottom-back">
      <a class="blog-bottom-link" id="blog-back-all" href="index.html#blogs">← Back to all</a>
      <a class="blog-bottom-link" id="blog-back-top" href="#top">↑ Back to top</a>
    </div>

    <div class="blog-bottom-row blog-bottom-series">
      <div class="blog-bottom-series-label" id="blog-series-label">In series</div>
      <a class="blog-bottom-link blog-bottom-link-prev" id="blog-prev-series" href="#" aria-disabled="true" tabindex="-1">← Previous in series</a>
      <a class="blog-bottom-link blog-bottom-link-next" id="blog-next-series" href="#" aria-disabled="true" tabindex="-1">Next in series →</a>
    </div>
  </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var postPath = normalizePostPath(params.get('post'));
      var titleEl = document.getElementById('blog-title');
      var bodyEl = document.getElementById('blog-body');
      var typeBadgeEl = document.getElementById('blog-type-badge');
      var metaEl = document.getElementById('blog-meta');

      function showError(msg) {
        titleEl.textContent = 'Post not found';
        bodyEl.innerHTML = '<p class="blog-error">' + msg + '</p>';
      }

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      /** Decode/normalize ?post= value so it matches profile.json paths (handles encoding + stray slashes). */
      function normalizePostPath(path) {
        if (path == null || path === '') return '';
        var p = String(path).trim();
        try {
          p = decodeURIComponent(p);
        } catch (e) {
          /* ignore */
        }
        // Handle common variants like "./data/..." or leading slashes.
        p = p.replace(/^(?:\.\/)+/, '');
        return p.replace(/^\/+/, '');
      }

      function urlsEqual(a, b) {
        return normalizePostPath(a) === normalizePostPath(b);
      }

      function findBlogMeta(profile, path) {
        if (!profile || !Array.isArray(profile.blogs)) return null;
        var want = normalizePostPath(path);
        for (var i = 0; i < profile.blogs.length; i++) {
          if (urlsEqual(profile.blogs[i].url, want)) return profile.blogs[i];
        }
        return null;
      }

      function getBlogTypeIcon(type) {
        var icons = {
          'medium': '📝',
          'linkedin': '💼',
          'local': '📄'
        };
        return icons[type] || '📚';
      }

      function getBlogTypeLabel(type) {
        var labels = {
          'medium': 'Medium',
          'linkedin': 'LinkedIn Article',
          'local': 'Blog Post'
        };
        return labels[type] || (type || 'Blog');
      }

      function setMeta(profile) {
        var shared = window['__profileData'] || profile || null;
        if (!shared || !postPath) return;
        var blog = findBlogMeta(shared, postPath);
        if (!blog) return;

        titleEl.textContent = blog.title || 'Blog Post';
        document.title = blog.title + ' - Laazer';

        typeBadgeEl.textContent = getBlogTypeIcon(blog.type) + ' ' + getBlogTypeLabel(blog.type);
        typeBadgeEl.style.display = 'inline-flex';

        if (blog.date) {
          metaEl.textContent = blog.date;
          metaEl.style.display = 'flex';
        }
      }

      /**
       * Always load fresh profile on this page. Cached window.__profileData from index.html
       * can be stale (missing posts / old URLs), which breaks prev/next matching.
       */
      function ensureProfileThenMeta() {
        var href = window.location.href.replace(/[#?].*$/, '');
        var base = href.substring(0, href.lastIndexOf('/') + 1);
        var url = base + 'data/profile.json';

        return fetch(url, { cache: 'no-store' })
          .then(function (res) {
            return res.ok ? res.json() : Promise.reject();
          })
          .then(function (data) {
            try {
              window['__profileData'] = data;
            } catch (e) {
              /* ignore */
            }
            setMeta(data);
            return data;
          })
          .catch(function () {
            var shared = window['__profileData'];
            if (shared) setMeta(shared);
            return shared;
          });
      }

      function parseDateKey(dateStr) {
        if (dateStr == null || dateStr === '') return '00000000';
        dateStr = String(dateStr).trim();
        var parts = dateStr.split('/');
        var y = parseInt(parts[0], 10);
        if (isNaN(y) || y < 0) return '00000000';
        var mo = parts.length > 1 ? parseInt(parts[1], 10) : 1;
        var day = parts.length > 2 ? parseInt(parts[2], 10) : 1;
        if (isNaN(mo) || isNaN(day)) return '00000000';
        var ys = String(y).padStart(4, '0');
        var ms = String(Math.min(12, Math.max(1, mo))).padStart(2, '0');
        var ds = String(Math.min(31, Math.max(1, day))).padStart(2, '0');
        return ys + ms + ds;
      }

      function seriesFromPath(url) {
        if (!url) return null;
        if (url.indexOf('data/blog/') !== 0) return null;
        var rest = url.slice('data/blog/'.length);
        var parts = rest.split('/');
        return parts[0] || null;
      }

      function seriesIndexFromPath(url) {
        if (!url) return null;
        // Examples:
        // - data/blog/Blobert/blog_post_1_intro.md
        // - data/blog/Blobert/blog_post_3_circle_to_sphere.md
        var m = url.match(/blog_post_(\d+)/);
        if (!m) return null;
        var n = parseInt(m[1], 10);
        return isNaN(n) ? null : n;
      }

      function setNavLink(el, href, labelText) {
        if (!el) return;
        el.textContent = labelText;
        if (!href) {
          el.removeAttribute('href');
          el.classList.add('disabled');
          el.setAttribute('aria-disabled', 'true');
          el.setAttribute('tabindex', '-1');
          el.removeAttribute('target');
          el.removeAttribute('rel');
          return;
        }
        el.setAttribute('href', href);
        el.classList.remove('disabled');
        el.setAttribute('aria-disabled', 'false');
        el.removeAttribute('tabindex');

        // If this nav link goes to an external URL, open it in a new tab.
        if (/^https?:\/\//.test(href)) {
          el.setAttribute('target', '_blank');
          el.setAttribute('rel', 'noopener noreferrer');
        } else {
          el.removeAttribute('target');
          el.removeAttribute('rel');
        }
      }

      var activeMermaidExpand = null;

      function closeMermaidExpand() {
        if (!activeMermaidExpand) return;
        var x = activeMermaidExpand;
        document.body.style.overflow = '';
        if (x.backdrop && x.backdrop.parentNode) {
          x.backdrop.parentNode.removeChild(x.backdrop);
        }
        if (x.onKey) document.removeEventListener('keydown', x.onKey);
        if (x.placeholder && x.placeholder.parentNode && x.outer.parentNode === document.body) {
          x.placeholder.parentNode.insertBefore(x.outer, x.placeholder);
          x.placeholder.parentNode.removeChild(x.placeholder);
        }
        x.outer.classList.remove('blog-mermaid--expanded');
        var zoomCtlClose = x.outer._mermaidZoom;
        if (zoomCtlClose && zoomCtlClose.saveCollapsedScale != null) {
          zoomCtlClose.setScale(zoomCtlClose.saveCollapsedScale);
          zoomCtlClose.saveCollapsedScale = null;
        }
        x.btnExpand.textContent = 'Expand';
        x.btnExpand.setAttribute('aria-label', 'Expand diagram');
        activeMermaidExpand = null;
      }

      /**
       * Glass panels use backdrop-filter, which creates a fixed-position containing block in
       * supporting browsers — expanded UI must be reparented to document.body to cover the viewport.
       */
      function openMermaidExpand(outer, btnExpand) {
        closeMermaidExpand();
        if (!outer.parentNode) return;
        var placeholder = document.createElement('span');
        placeholder.className = 'blog-mermaid-placeholder';
        placeholder.setAttribute('aria-hidden', 'true');
        placeholder.style.display = 'none';
        outer.parentNode.insertBefore(placeholder, outer);
        document.body.appendChild(outer);

        var backdrop = document.createElement('div');
        backdrop.className = 'blog-mermaid-backdrop';
        document.body.appendChild(backdrop);
        outer.classList.add('blog-mermaid--expanded');
        document.body.style.overflow = 'hidden';
        var onKey = function (e) {
          if (e.key === 'Escape') closeMermaidExpand();
        };
        document.addEventListener('keydown', onKey);
        backdrop.addEventListener('click', closeMermaidExpand);
        btnExpand.textContent = 'Close';
        btnExpand.setAttribute('aria-label', 'Close diagram');
        activeMermaidExpand = {
          outer: outer,
          backdrop: backdrop,
          onKey: onKey,
          btnExpand: btnExpand,
          placeholder: placeholder
        };
        var zoomCtlOpen = outer._mermaidZoom;
        if (zoomCtlOpen) {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (!outer.classList.contains('blog-mermaid--expanded')) return;
              zoomCtlOpen.applyExpandedFit();
            });
          });
        }
      }

      function wireMermaidBlock(outer) {
        var scaleWrap = outer.querySelector('.blog-mermaid-scale');
        var viewport = outer.querySelector('.blog-mermaid-viewport');
        var btnIn = outer.querySelector('[data-mermaid-zoom="in"]');
        var btnOut = outer.querySelector('[data-mermaid-zoom="out"]');
        var btnReset = outer.querySelector('[data-mermaid-zoom="reset"]');
        var btnExpand = outer.querySelector('[data-mermaid-expand]');
        if (!scaleWrap || !viewport || !btnIn || !btnOut || !btnReset || !btnExpand) return;

        var DEFAULT_SCALE = 1.0;
        var scale = DEFAULT_SCALE;
        var MIN = 0.05;
        var MAX = 20;
        var STEP = 1.25;

        function applyScale() {
          scaleWrap.style.zoom = scale;
          btnReset.setAttribute(
            'aria-label',
            'Reset zoom to default (' + Math.round(DEFAULT_SCALE * 100) + '%), currently ' + Math.round(scale * 100) + '%'
          );
        }

        outer._mermaidZoom = {
          saveCollapsedScale: null,
          getScale: function () {
            return scale;
          },
          setScale: function (s) {
            scale = Math.max(MIN, Math.min(MAX, s));
            applyScale();
          },
          applyExpandedFit: function () {
            if (!outer.classList.contains('blog-mermaid--expanded')) return;
            var vp = outer.querySelector('.blog-mermaid-viewport');
            var sw = outer.querySelector('.blog-mermaid-scale');
            if (!vp || !sw) return;
            // Reset zoom to measure natural content dimensions
            sw.style.zoom = '';
            var contentW = sw.offsetWidth || sw.scrollWidth;
            var contentH = sw.offsetHeight || sw.scrollHeight;
            var pad = 48;
            var vw = Math.max(1, vp.clientWidth - pad);
            var vh = Math.max(1, vp.clientHeight - pad);
            if (contentW < 1 || contentH < 1) return;
            var fit = Math.min(vw / contentW, vh / contentH, MAX);
            fit = Math.max(MIN, fit * 0.94);
            scale = fit;
            applyScale();
          }
        };

        btnIn.addEventListener('click', function () {
          scale = Math.min(MAX, scale * STEP);
          applyScale();
        });
        btnOut.addEventListener('click', function () {
          scale = Math.max(MIN, scale / STEP);
          applyScale();
        });
        btnReset.addEventListener('click', function () {
          scale = DEFAULT_SCALE;
          applyScale();
        });
        btnExpand.addEventListener('click', function () {
          if (activeMermaidExpand && activeMermaidExpand.outer === outer) {
            closeMermaidExpand();
          } else {
            if (outer._mermaidZoom) {
              outer._mermaidZoom.saveCollapsedScale = outer._mermaidZoom.getScale();
            }
            openMermaidExpand(outer, btnExpand);
          }
        });
        viewport.addEventListener('wheel', function (e) {
          if (!e.ctrlKey && !e.metaKey) return;
          e.preventDefault();
          var dir = e.deltaY < 0 ? STEP : (1 / STEP);
          scale = Math.max(MIN, Math.min(MAX, scale * dir));
          applyScale();
        }, { passive: false });
        applyScale();
      }

      /** Turn ```mermaid fences into divs Mermaid can render (marked emits pre > code.language-mermaid). */
      function prepareMermaidBlocks(root) {
        var codes = root.querySelectorAll('pre code.language-mermaid');
        for (var i = 0; i < codes.length; i++) {
          var codeEl = codes[i];
          var pre = codeEl.parentNode;
          if (!pre || pre.tagName !== 'PRE') continue;
          var graph = codeEl.textContent;
          var outer = document.createElement('div');
          outer.className = 'blog-mermaid';

          var toolbar = document.createElement('div');
          toolbar.className = 'blog-mermaid-toolbar';
          toolbar.setAttribute('role', 'toolbar');
          toolbar.setAttribute('aria-label', 'Diagram controls');

          function makeBtn(text, ariaLabel, attrs) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'blog-mermaid-btn';
            b.textContent = text;
            b.setAttribute('aria-label', ariaLabel);
            if (attrs) {
              for (var k in attrs) {
                if (Object.prototype.hasOwnProperty.call(attrs, k)) {
                  b.setAttribute(k, attrs[k]);
                }
              }
            }
            return b;
          }

          toolbar.appendChild(makeBtn('−', 'Zoom out', { 'data-mermaid-zoom': 'out' }));
          toolbar.appendChild(makeBtn('+', 'Zoom in', { 'data-mermaid-zoom': 'in' }));
          toolbar.appendChild(makeBtn('Reset', 'Reset zoom', { 'data-mermaid-zoom': 'reset' }));
          toolbar.appendChild(makeBtn('Expand', 'Expand diagram', { 'data-mermaid-expand': 'true' }));

          var viewport = document.createElement('div');
          viewport.className = 'blog-mermaid-viewport';

          var scaleWrap = document.createElement('div');
          scaleWrap.className = 'blog-mermaid-scale';

          var inner = document.createElement('div');
          inner.className = 'mermaid';
          inner.textContent = graph;

          scaleWrap.appendChild(inner);
          viewport.appendChild(scaleWrap);
          outer.appendChild(toolbar);
          outer.appendChild(viewport);
          pre.parentNode.replaceChild(outer, pre);
          wireMermaidBlock(outer);
        }
      }

      function highlightBlogCode(root) {
        if (!window.hljs) return;
        var codes = root.querySelectorAll('pre code');
        for (var j = 0; j < codes.length; j++) {
          var el = codes[j];
          try {
            /* Default CDN build has no gdscript; Python is close enough for readability. */
            if (el.classList.contains('language-gdscript')) {
              el.classList.remove('language-gdscript');
              el.classList.add('language-python');
            }
            window.hljs.highlightElement(el);
          } catch (err) {
            /* unknown or empty language */
          }
        }
      }

      var mermaidInitialized = false;

      function initMermaidOnce() {
        if (mermaidInitialized || !window.mermaid) return;
        window.mermaid.initialize({
          startOnLoad: false,
          theme: 'dark',
          themeVariables: {
            fontSize: '16px',
            primaryColor: '#1e3a5f',
            primaryTextColor: '#e5e7eb',
            lineColor: '#94a3b8',
            mainBkg: '#0f172a',
            nodeBorder: '#38bdf8',
            clusterBkg: 'rgba(15, 23, 42, 0.55)',
            titleColor: '#7dd3fc',
            edgeLabelBackground: '#0f172a',
            actorBkg: '#1e293b',
            actorBorder: '#7dd3fc',
            actorTextColor: '#e5e7eb'
          }
        });
        mermaidInitialized = true;
      }

      function runMermaidIn(root) {
        if (!window.mermaid) return;
        initMermaidOnce();
        var nodes = root.querySelectorAll('.blog-mermaid .mermaid');
        if (!nodes.length) return;
        var runResult = window.mermaid.run({ nodes: nodes });
        if (runResult && typeof runResult.then === 'function') {
          runResult.catch(function (e) {
            console.warn('Mermaid render failed:', e);
          });
        }
      }

      function computeLocalNav(profile, postUrl) {
        postUrl = normalizePostPath(postUrl);
        if (!profile || !Array.isArray(profile.blogs) || !postUrl) {
          return { seriesName: null, prev: null, next: null, prevSeries: null, nextSeries: null };
        }

        var allBlogs = profile.blogs.filter(function (b) {
          return b && typeof b.url === 'string';
        });

        var localBlogs = profile.blogs.filter(function (b) {
          return b && b.type === 'local' && typeof b.url === 'string' && b.url.indexOf('data/blog/') === 0;
        });

        var seriesName = seriesFromPath(postUrl);

        // Overall order by date ascending (oldest -> newest) for prev/next.
        var overall = allBlogs.slice().sort(function (a, b) {
          var ka = parseDateKey(a.date);
          var kb = parseDateKey(b.date);
          var cmp = ka.localeCompare(kb);
          return cmp !== 0 ? cmp : 0;
        });

        var idx = overall.findIndex(function (b) { return urlsEqual(b.url, postUrl); });
        var prev = idx > 0 ? overall[idx - 1] : null;
        var next = idx >= 0 && idx < overall.length - 1 ? overall[idx + 1] : null;

        // In-series order: same seriesName, also oldest -> newest (local posts only).
        var prevSeries = null;
        var nextSeries = null;
        if (seriesName && localBlogs.length) {
          var seriesBlogs = localBlogs.filter(function (b) {
            return seriesFromPath(b.url) === seriesName;
          }).slice().sort(function (a, b) {
            var ia = seriesIndexFromPath(a.url);
            var ib = seriesIndexFromPath(b.url);
            if (ia != null && ib != null && ia !== ib) return ia - ib;

            var ka = parseDateKey(a.date);
            var kb = parseDateKey(b.date);
            var cmp = ka.localeCompare(kb);
            return cmp !== 0 ? cmp : 0;
          });

          var sidx = seriesBlogs.findIndex(function (b) { return urlsEqual(b.url, postUrl); });
          if (sidx >= 0) {
            prevSeries = sidx > 0 ? seriesBlogs[sidx - 1] : null;
            nextSeries = sidx < seriesBlogs.length - 1 ? seriesBlogs[sidx + 1] : null;
          }
        }

        return { seriesName: seriesName, prev: prev, next: next, prevSeries: prevSeries, nextSeries: nextSeries };
      }

      function loadPost() {
        if (!postPath) {
          showError('No blog post specified.');
          return;
        }

        var bottomNavEl = document.getElementById('blog-bottom-nav');
        var prevEl = document.getElementById('blog-prev');
        var nextEl = document.getElementById('blog-next');
        var prevSeriesEl = document.getElementById('blog-prev-series');
        var nextSeriesEl = document.getElementById('blog-next-series');
        var seriesLabelEl = document.getElementById('blog-series-label');

        // Render markdown, then (if possible) compute navigation using profile data.
        fetch(postPath)
          .then(function (res) {
            if (!res.ok) throw new Error('Failed to load post.');
            return res.text();
          })
          .then(function (markdown) {
            var html = '';
            try {
              html = window.marked ? window.marked.parse(markdown) : escapeHtml(markdown);
            } catch (e) {
              html = escapeHtml(markdown);
            }
            bodyEl.innerHTML = html;
            prepareMermaidBlocks(bodyEl);
            highlightBlogCode(bodyEl);
            runMermaidIn(bodyEl);
          })
          .catch(function () {
            showError('Unable to load this blog post.');
          });

        ensureProfileThenMeta().then(function (profile) {
          // If profile failed, ensureProfileThenMeta resolves undefined; keep the simple back link only.
          var nav = computeLocalNav(profile, postPath);
          if (!nav) {
            if (bottomNavEl) {
              bottomNavEl.style.display = 'block';
              bottomNavEl.setAttribute('aria-hidden', 'false');
            }
            if (seriesLabelEl) seriesLabelEl.textContent = 'In series';
            setNavLink(prevEl, null, '← Previous');
            setNavLink(nextEl, null, 'Next →');
            setNavLink(prevSeriesEl, null, '← Previous in series');
            setNavLink(nextSeriesEl, null, 'Next in series →');
            return;
          }

          function getNavHref(blog) {
            if (!blog || !blog.url) return null;
            if (blog.type === 'local') {
              return 'blog.html?post=' + encodeURIComponent(blog.url) + '&v=6';
            }
            return blog.url;
          }

          if (bottomNavEl) {
            bottomNavEl.style.display = 'block';
            bottomNavEl.setAttribute('aria-hidden', 'false');
          }

          if (seriesLabelEl) {
            seriesLabelEl.textContent = nav.seriesName ? ('In series: ' + nav.seriesName) : 'In series';
          }

          setNavLink(
            prevEl,
            getNavHref(nav.prev),
            '← Previous'
          );
          setNavLink(
            nextEl,
            getNavHref(nav.next),
            'Next →'
          );

          setNavLink(
            prevSeriesEl,
            getNavHref(nav.prevSeries),
            '← Previous in series'
          );
          setNavLink(
            nextSeriesEl,
            getNavHref(nav.nextSeries),
            'Next in series →'
          );
        });
      }

      loadPost();
    })();
  </script>
</body>
</html>
